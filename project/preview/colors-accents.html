<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px; background: var(--bg-raised); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { height: 120px; border-radius: var(--r-md); padding: 10px 12px;
        display: flex; flex-direction: column; justify-content: space-between;
        box-shadow: var(--shadow-sm); }
  .n  { font-family: var(--font-body); font-weight: 700; font-size: 13px; }
  .h  { font-family: var(--font-mono); font-size: 11px; opacity: 0.8; }
  .tag { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
         letter-spacing: 0.1em; opacity: 0.85; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="sw" style="background:#D4E4C8;color:#1F4A1E;">
      <div><div class="n">Fairway Soft</div><div class="tag">birdie tint</div></div><span class="h">#D4E4C8</span></div>
    <div class="sw" style="background:#F2C14E;color:#2A2418;">
      <div><div class="n">Sun</div><div class="tag">eagle · gold badge</div></div><span class="h">#F2C14E</span></div>
    <div class="sw" style="background:#E5C98A;color:#2A2418;">
      <div><div class="n">Sand</div><div class="tag">bunker · tags</div></div><span class="h">#E5C98A</span></div>
    <div class="sw" style="background:#A9D3E0;color:#2A2418;">
      <div><div class="n">Sky</div><div class="tag">rare · water</div></div><span class="h">#A9D3E0</span></div>
  </div>
</div></body></html>
