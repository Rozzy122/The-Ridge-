<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px; background: var(--ridge-parchment); }
  .row { display: flex; gap: 22px; align-items: center; justify-content: space-around; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box  { width: 96px; height: 72px; background: var(--bg-raised);
          border-radius: var(--r-md); display: flex; align-items: center; justify-content: center;
          font-family: var(--font-body); font-weight: 700; color: var(--fg-muted); font-size: 13px; }
  .sm  { box-shadow: var(--shadow-sm); }
  .md  { box-shadow: var(--shadow-md); }
  .lg  { box-shadow: var(--shadow-lg); }
  .inn { box-shadow: var(--shadow-inset); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="cell"><div class="box sm">rest</div><div class="lbl">shadow-sm</div></div>
    <div class="cell"><div class="box md">hover</div><div class="lbl">shadow-md</div></div>
    <div class="cell"><div class="box lg">float</div><div class="lbl">shadow-lg</div></div>
    <div class="cell"><div class="box inn">inset</div><div class="lbl">shadow-inset</div></div>
  </div>
</div></body></html>
