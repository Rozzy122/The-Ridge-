<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; background: var(--bg-raised); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--ridge-lime); border-radius: var(--r-xs);
         box-shadow: var(--shadow-sm); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .num { font-family: var(--font-body); font-weight: 700; font-size: 12px; color: var(--fg); }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="step"><div class="bar" style="width:4px;height:4px"></div><div class="num">4</div><div class="lbl">s-1</div></div>
    <div class="step"><div class="bar" style="width:8px;height:8px"></div><div class="num">8</div><div class="lbl">s-2</div></div>
    <div class="step"><div class="bar" style="width:12px;height:12px"></div><div class="num">12</div><div class="lbl">s-3</div></div>
    <div class="step"><div class="bar" style="width:16px;height:16px"></div><div class="num">16</div><div class="lbl">s-4</div></div>
    <div class="step"><div class="bar" style="width:24px;height:24px"></div><div class="num">24</div><div class="lbl">s-5</div></div>
    <div class="step"><div class="bar" style="width:32px;height:32px"></div><div class="num">32</div><div class="lbl">s-6</div></div>
    <div class="step"><div class="bar" style="width:48px;height:48px"></div><div class="num">48</div><div class="lbl">s-7</div></div>
    <div class="step"><div class="bar" style="width:64px;height:64px"></div><div class="num">64</div><div class="lbl">s-8</div></div>
    <div class="step"><div class="bar" style="width:96px;height:96px"></div><div class="num">96</div><div class="lbl">s-9</div></div>
  </div>
</div></body></html>
