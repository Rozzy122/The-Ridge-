<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; background: var(--ridge-parchment); }
  .round { background: var(--ridge-bone); border-radius: var(--r-lg);
           border: 1px solid var(--line); box-shadow: var(--shadow-md);
           padding: 18px 20px; display: grid;
           grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; }
  .num { font-family: var(--font-display); font-size: 56px; line-height: 1.0;
         color: var(--ridge-apple); }
  .course { font-family: var(--font-sign); font-size: 22px; color: var(--fg); margin: 0; }
  .meta { font-family: var(--font-body); font-size: 13px; color: var(--fg-muted); margin-top: 4px; }
  .stat { font-family: var(--font-mono); font-variant-numeric: tabular-nums;
          font-size: 36px; font-weight: 700; color: var(--ridge-fairway); text-align: right; }
  .stat-sub { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.14em;
              text-transform: uppercase; color: var(--fg-muted); text-align: right; }
  .chip { display: inline-block; font-family: var(--font-body); font-size: 11px;
          font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
          background: var(--ridge-apple-soft); color: var(--ridge-apple-ink);
          padding: 3px 8px; border-radius: var(--r-pill); margin-left: 6px; }
</style></head>
<body><div class="card">
  <div class="round">
    <div class="num">07</div>
    <div>
      <h3 class="course">Pebble Creek GC <span class="chip">+12</span></h3>
      <div class="meta">Saturday, Jul 12 · with Connor, Sam, Jake · sunny &amp; breezy</div>
    </div>
    <div>
      <div class="stat">84</div>
      <div class="stat-sub">Final · 18 holes</div>
    </div>
  </div>
</div></body></html>
