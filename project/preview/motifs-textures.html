<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 0; height: 100%; overflow: hidden; display: grid;
          grid-template-columns: 1fr 1fr 1fr; }
  .swatch { min-height: 200px; display: flex; align-items: flex-end; padding: 14px;
            font-family: var(--font-body); font-size: 11px; font-weight: 700;
            letter-spacing: 0.14em; text-transform: uppercase; }
  .dimple {
    background:
      radial-gradient(circle at 25% 25%, rgba(255,255,255,0.35) 0 2px, transparent 2px),
      radial-gradient(circle at 75% 75%, rgba(0,0,0,0.12) 0 2px, transparent 2px),
      radial-gradient(circle at 75% 25%, rgba(255,255,255,0.25) 0 2px, transparent 2px),
      radial-gradient(circle at 25% 75%, rgba(0,0,0,0.12) 0 2px, transparent 2px),
      var(--ridge-apple);
    background-size: 16px 16px;
    color: #fff;
  }
  .scorecard {
    background-color: var(--ridge-cream);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 20px 20px;
    color: var(--ridge-pencil);
  }
  .topo {
    background:
      repeating-radial-gradient(circle at 30% 120%, transparent 0 18px, rgba(47,107,45,0.28) 18px 20px),
      var(--ridge-fairway);
    color: #fff;
  }
</style></head>
<body><div class="card">
  <div class="swatch dimple">Apple dimple</div>
  <div class="swatch scorecard">Scorecard</div>
  <div class="swatch topo">Topo Ridge</div>
</div></body></html>
