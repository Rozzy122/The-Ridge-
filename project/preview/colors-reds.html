<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px; background: var(--bg-raised); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { height: 120px; border-radius: var(--r-md); padding: 10px 12px;
        display: flex; flex-direction: column; justify-content: space-between;
        box-shadow: var(--shadow-sm); }
  .n  { font-family: var(--font-body); font-weight: 700; font-size: 13px; }
  .h  { font-family: var(--font-mono); font-size: 11px; opacity: 0.8; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="sw" style="background:#D45A4A;color:#fff;"><span class="n">Rust</span><span class="h">#D45A4A</span></div>
    <div class="sw" style="background:#B83A2E;color:#fff;"><span class="n">Apple · brand</span><span class="h">#B83A2E</span></div>
    <div class="sw" style="background:#962A20;color:#fff;"><span class="n">Apple Ink</span><span class="h">#962A20</span></div>
    <div class="sw" style="background:#6E1C13;color:#F3D5D0;"><span class="n">Apple Deep</span><span class="h">#6E1C13</span></div>
    <div class="sw" style="background:#F3D5D0;color:#6E1C13;"><span class="n">Apple Soft</span><span class="h">#F3D5D0</span></div>
    <div class="sw" style="background:#5A8A3A;color:#fff;"><span class="n">Moss</span><span class="h">#5A8A3A</span></div>
    <div class="sw" style="background:#2F6B2D;color:#fff;"><span class="n">Fairway</span><span class="h">#2F6B2D</span></div>
    <div class="sw" style="background:#1F4A1E;color:#D4E4C8;"><span class="n">Fairway Dk</span><span class="h">#1F4A1E</span></div>
  </div>
</div></body></html>
