<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; background: var(--bg-raised); }
  .row { display: flex; gap: 18px; align-items: center; justify-content: space-between; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box  { width: 72px; height: 72px; background: var(--ridge-lime-soft);
          border: 2px solid var(--ridge-fairway); }
  .lbl  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .num  { font-family: var(--font-body); font-weight: 700; font-size: 12px; color: var(--fg); }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="num">4</div><div class="lbl">r-xs</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="num">8</div><div class="lbl">r-sm</div></div>
    <div class="cell"><div class="box" style="border-radius:14px"></div><div class="num">14</div><div class="lbl">r-md · default</div></div>
    <div class="cell"><div class="box" style="border-radius:22px"></div><div class="num">22</div><div class="lbl">r-lg</div></div>
    <div class="cell"><div class="box" style="border-radius:32px"></div><div class="num">32</div><div class="lbl">r-xl</div></div>
    <div class="cell"><div class="box" style="border-radius:999px"></div><div class="num">∞</div><div class="lbl">r-pill</div></div>
  </div>
</div></body></html>
