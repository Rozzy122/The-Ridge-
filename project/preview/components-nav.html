<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 0; background: var(--ridge-fairway-dk); overflow: hidden; }
  .nav { padding: 14px 24px; display: flex; align-items: center; gap: 20px;
         color: var(--ridge-cream); background:
         radial-gradient(circle at 20% 30%, rgba(212,90,74,0.18), transparent 50%),
         var(--ridge-fairway-dk); }
  .mark { display: flex; align-items: center; gap: 10px; }
  .mark img { width: 40px; height: 40px; object-fit: contain;
              filter: drop-shadow(0 1px 0 rgba(0,0,0,0.25)); }
  .mark span { font-family: var(--font-display); font-size: 32px;
               color: var(--ridge-cream); line-height: 1; white-space: nowrap; }
  .links { display: flex; gap: 20px; margin-left: auto; }
  .links a { font-family: var(--font-body); font-size: 14px; font-weight: 600;
             color: var(--ridge-cream); text-decoration: none; opacity: 0.85; }
  .links a.on { color: #fff; opacity: 1;
                border-bottom: 2px solid var(--ridge-apple); padding-bottom: 2px; }
  .cta { font-family: var(--font-body); font-weight: 700; font-size: 13px;
         background: var(--ridge-apple); color: #fff;
         padding: 8px 16px; border-radius: var(--r-pill); text-decoration: none;
         box-shadow: 0 3px 0 var(--ridge-apple-ink); }
</style></head>
<body><div class="card">
  <div class="nav">
    <div class="mark"><img src="../assets/logo-apple.png" alt=""><span>The Ridge</span></div>
    <div class="links">
      <a href="#" class="on">Rounds</a>
      <a href="#">Courses</a>
      <a href="#">Friends</a>
      <a href="#">Stats</a>
    </div>
    <a href="#" class="cta">+ Log a Round</a>
  </div>
</div></body></html>
