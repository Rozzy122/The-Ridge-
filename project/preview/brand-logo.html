<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { display: flex; align-items: center; gap: 28px; background: var(--ridge-cream); }
  .logo { width: 180px; height: 180px; flex: 0 0 180px;
          display: flex; align-items: center; justify-content: center; }
  .logo img { width: 100%; height: 100%; object-fit: contain; }
  .name { font-family: var(--font-display); font-size: 72px; line-height: 0.9;
          color: var(--ridge-apple); margin: 0 0 4px 0; }
  .name em { font-style: normal; color: var(--ridge-fairway); }
  .tag  { font-family: var(--font-sign); font-size: 16px; letter-spacing: 0.08em;
          text-transform: uppercase; color: var(--ridge-fairway); }
  .sub  { font-family: var(--font-serif); font-style: italic; color: var(--fg-muted);
          font-size: 15px; margin-top: 10px; max-width: 36ch; }
</style></head>
<body><div class="card">
  <div class="logo"><img src="../assets/logo-ridge.png" alt="The Ridge"></div>
  <div>
    <div class="name">The <em>Ridge</em></div>
    <div class="tag">Est. Summer 2026 · 18 Holes &amp; Friends</div>
    <div class="sub">A summer logbook of every round, every course, every impossible up-and-down.</div>
  </div>
</div></body></html>
