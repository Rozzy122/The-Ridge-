<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px; background: var(--bg-raised); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { height: 120px; border-radius: var(--r-md); padding: 10px 12px;
        display: flex; flex-direction: column; justify-content: space-between;
        box-shadow: var(--shadow-sm); }
  .n  { font-family: var(--font-body); font-weight: 700; font-size: 13px; }
  .h  { font-family: var(--font-mono); font-size: 11px; opacity: 0.8; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="sw" style="background:#FBF7EC;color:#2A2418;border:1px solid var(--line);"><span class="n">Bone</span><span class="h">#FBF7EC</span></div>
    <div class="sw" style="background:#F7F1E1;color:#2A2418;border:1px solid var(--line);"><span class="n">Cream · bg</span><span class="h">#F7F1E1</span></div>
    <div class="sw" style="background:#EFE5CC;color:#2A2418;"><span class="n">Parchment</span><span class="h">#EFE5CC</span></div>
    <div class="sw" style="background:#E5C98A;color:#2A2418;"><span class="n">Sand</span><span class="h">#E5C98A</span></div>
    <div class="sw" style="background:#B8A98C;color:#2A2418;"><span class="n">Mist</span><span class="h">#B8A98C</span></div>
    <div class="sw" style="background:#5C4A36;color:#F7F1E1;"><span class="n">Pencil</span><span class="h">#5C4A36</span></div>
    <div class="sw" style="background:#2A2418;color:#F7F1E1;"><span class="n">Ink · fg</span><span class="h">#2A2418</span></div>
    <div class="sw" style="background:#D8C9A7;color:#2A2418;"><span class="n">Line</span><span class="h">#D8C9A7</span></div>
  </div>
</div></body></html>
