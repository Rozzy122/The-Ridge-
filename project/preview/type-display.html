<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; background: var(--bg-raised); }
  .spec { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em;
          text-transform: uppercase; color: var(--fg-muted); margin-bottom: 4px; }
  .sample { font-family: var(--font-display); color: var(--ridge-apple);
            font-size: 88px; line-height: 1.0; margin: 0; }
  .sample em { font-style: normal; color: var(--ridge-fairway); }
  .sub { font-family: var(--font-sign); font-size: 22px; color: var(--ridge-fairway);
         letter-spacing: 0.04em; margin-top: 10px; }
</style></head>
<body><div class="card">
  <div class="spec">Display · Caveat Brush · 88 · Apple red + Fairway green</div>
  <h1 class="sample">The <em>Ridge.</em></h1>
  <div class="sub">CHUNKY RETRO — SHRIKHAND</div>
</div></body></html>
