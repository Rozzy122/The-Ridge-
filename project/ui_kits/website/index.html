<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Ridge — Website UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/logo-ridge.png">
<style>
  html, body { margin: 0; padding: 0; background: var(--ridge-cream); }
  #app { min-height: 100vh; }
  input, select, textarea { font-family: var(--font-body); }
  input:focus, select:focus, textarea:focus {
    border-color: var(--ridge-lime-ink) !important;
    box-shadow: 0 0 0 3px var(--ridge-lime-soft) !important;
  }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Round.jsx"></script>
<script type="text/babel" src="Friends.jsx"></script>
<script type="text/babel">
  const { useState } = React;

  function App() {
    const [page, setPage] = useState(
      localStorage.getItem('ridge-page') || 'home'
    );
    const go = (p) => { localStorage.setItem('ridge-page', p); setPage(p); };
    return (
      <div data-screen-label={`01 ${page}`}>
        <Nav page={page} setPage={go} />
        {page === 'home'     && <HomePage setPage={go} />}
        {page === 'rounds'   && <HomePage setPage={go} />}
        {page === 'courses'  && <CoursesPage />}
        {page === 'friends'  && <FriendsPage />}
        {page === 'stats'    && <StatsPage />}
        {page === 'round'    && <RoundDetailPage />}
        {page === 'log'      && <LogRoundPage />}
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
